<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#171d26">
<title>MeetingWords — editor</title>
<link rel="stylesheet" href="/styles.css">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<script>(() => { const t = localStorage.getItem("mw-theme"); document.documentElement.dataset.theme = t === "light" || t === "dark" ? t : matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"; })();</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">

<div class="topbar">
  <a href="/" class="icon-btn" data-i18n-title="nav.allDocs" title="All docs" aria-label="All docs">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
  </a>
  <input type="text" id="title" data-i18n-placeholder="editor.untitled" placeholder="untitled">
  <span class="status-dot" id="status" title="connection"></span>
  <div class="roster" id="roster"></div>
  <span class="spacer"></span>
  <div class="menu-wrap">
    <button class="icon-btn" id="share-button" data-i18n-title="editor.shareExport" title="Share &amp; export" aria-label="Share and export" aria-haspopup="menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      <span class="badge-dot hidden" id="share-dot"></span>
    </button>
    <div class="menu hidden" id="share-menu" role="menu">
      <button role="menuitemradio" aria-checked="false" data-access="none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        <span data-i18n="editor.private">Private</span>
      </button>
      <button role="menuitemradio" aria-checked="false" data-access="view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        <span data-i18n="editor.shareView">Share: view</span>
      </button>
      <button role="menuitemradio" aria-checked="false" data-access="comment">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        <span data-i18n="editor.shareComment">Share: comment</span>
      </button>
      <button role="menuitemradio" aria-checked="false" data-access="edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        <span data-i18n="editor.shareEdit">Share: edit</span>
      </button>
      <div class="sep hidden" id="copy-sep"></div>
      <button id="copy-link" class="hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span data-i18n="editor.copyLink">Copy link</span>
      </button>
      <div class="sep"></div>
      <button id="download-md">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span data-i18n="editor.downloadMd">Download .md</span>
      </button>
    </div>
  </div>
  <button class="icon-btn" id="toggle-linenos" data-i18n-title="editor.lineNumbers" title="Line numbers" aria-label="Line numbers" aria-pressed="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
  </button>
  <div class="mode-switch" id="mode-switch" role="radiogroup" aria-label="View mode">
    <button class="icon-btn" data-mode="edit" role="radio" aria-checked="false" data-i18n-title="editor.modeEdit" title="Edit" aria-label="Edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
    </button>
    <button class="icon-btn" data-mode="split" role="radio" aria-checked="false" data-i18n-title="editor.modeSplit" title="Split" aria-label="Split">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
    </button>
    <button class="icon-btn" data-mode="read" role="radio" aria-checked="false" data-i18n-title="editor.modeRead" title="Read" aria-label="Read">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <button class="icon-btn" id="toggle-comments" data-i18n-title="editor.comments" title="Comments" aria-label="Comments" aria-pressed="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
</div>

<div class="editor-shell">
  <div class="editor-main">
    <div class="editor-cm" id="source"></div>
    <div class="pane-divider hidden" id="pane-divider" data-i18n-title="editor.dragResize" title="Drag to resize"></div>
    <div class="preview hidden" id="preview"></div>
  </div>
  <div class="sidebar hidden" id="sidebar">
    <h3 data-i18n="editor.comments">Comments</h3>
    <button id="comment-selection" data-i18n="editor.commentOnSelection" style="width:100%; margin-bottom:10px;">Comment on selection</button>
    <div id="threads"></div>
  </div>
</div>

<script type="module" src="/editor.js"></script>
