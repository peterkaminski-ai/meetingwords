<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#171d26">
<title>MeetingWords — shared doc</title>
<link rel="stylesheet" href="/styles.css">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<script>(() => { const t = localStorage.getItem("mw-theme"); document.documentElement.dataset.theme = t === "light" || t === "dark" ? t : matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"; })();</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">

<div class="topbar">
  <span class="brand"><a class="brand-glyph" href="/" data-i18n-title="nav.home" title="Home" aria-label="Home">▦</a> <span id="doc-title" data-i18n="shareView.sharedDoc">Shared doc</span></span>
  <span class="status-dot" id="status" title="connection"></span>
  <div class="roster" id="roster"></div>
  <span class="spacer"></span>
  <select id="lang-select" class="lang-select"></select>
  <span class="muted small" id="viewer-name"></span>
  <button class="icon-btn" id="download-md" data-i18n-title="editor.downloadMd" title="Download .md" aria-label="Download markdown">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button class="icon-btn hidden" id="set-name" data-i18n-title="shareView.setName" title="Set your name" aria-label="Set your name">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </button>
  <button class="icon-btn hidden" id="toggle-linenos" data-i18n-title="editor.lineNumbers" title="Line numbers" aria-label="Line numbers" aria-pressed="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
  </button>
  <div class="mode-switch hidden" id="mode-switch" role="radiogroup" aria-label="View mode">
    <button class="icon-btn" data-mode="edit" role="radio" aria-checked="false" data-i18n-title="editor.modeEdit" title="Edit" aria-label="Edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
    </button>
    <button class="icon-btn" data-mode="split" role="radio" aria-checked="false" data-i18n-title="editor.modeSplit" title="Split" aria-label="Split">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
    </button>
    <button class="icon-btn" data-mode="read" role="radio" aria-checked="false" data-i18n-title="editor.modeRead" title="Read" aria-label="Read">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <button class="icon-btn hidden" id="toggle-comments" data-i18n-title="editor.comments" title="Comments" aria-label="Comments" aria-pressed="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
</div>

<div id="instance-banner" class="instance-banner" hidden></div>

<!-- Save affordance: only when the instance is fronted by a front desk
     (viewer.instance.frontdeskUrl); self-hosted instances never show it. -->
<div id="save-ribbon" class="save-ribbon" hidden>
  <form id="save-form">
    <span class="save-prompt" data-i18n="save.prompt">Don't lose this link — bookmark it, or save it here:</span>
    <input type="email" id="save-email" data-i18n-placeholder="save.emailPlaceholder" placeholder="you@example.com" autocomplete="email" required>
    <button class="primary" type="submit" data-i18n="save.button">Save to your documents</button>
  </form>
  <span class="save-sent hidden" id="save-sent" data-i18n="save.sent">Check your email — click the link there to finish saving.</span>
  <button type="button" class="icon-btn save-dismiss" id="save-dismiss" data-i18n-title="save.dismiss" title="Dismiss" aria-label="Dismiss">✕</button>
</div>

<div id="not-found" class="wrap hidden">
  <h2 data-i18n="shareView.notFound">Not found</h2>
  <p class="muted" data-i18n="shareView.notFoundBody">This shared doc doesn't exist, or sharing was turned off.</p>
</div>

<!-- view / comment access: rendered document -->
<div id="reader" class="rendered hidden"></div>

<!-- edit access: full collaborative editor -->
<div class="editor-shell hidden" id="editor-shell">
  <div class="editor-main">
    <div class="editor-cm" id="source"></div>
    <div class="pane-divider hidden" id="pane-divider" data-i18n-title="editor.dragResize" title="Drag to resize"></div>
    <div class="preview hidden" id="preview"></div>
  </div>
  <div class="sidebar hidden" id="sidebar">
    <h3 data-i18n="editor.comments">Comments</h3>
    <button id="comment-selection" data-i18n="editor.commentOnSelection" style="width:100%; margin-bottom:10px;">Comment on selection</button>
    <div id="threads"></div>
  </div>
</div>

<dialog id="name-dialog">
  <h3 style="margin-top:0" data-i18n="shareView.whoAreYou">Who are you?</h3>
  <p class="muted small" data-i18n="shareView.nameShown">Your name is shown with your comments and edits.</p>
  <form method="dialog" id="name-form" style="display:flex; gap:8px;">
    <input type="text" id="name-input" data-i18n-placeholder="shareView.yourName" placeholder="Your name" style="flex:1" required>
    <button class="primary" type="submit" data-i18n="shareView.join">Join</button>
  </form>
</dialog>

<script type="module" src="/share.js"></script>
